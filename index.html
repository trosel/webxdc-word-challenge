<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Word Challenge</title>
<style>
:root {
  --bg: #ffffff;
  --fg: #1a1a1b;
  --muted: #787c7e;
  --line: #d3d6da;
  --tile-line: #d3d6da;
  --key-bg: #d3d6da;
  --key-fg: #1a1a1b;
  --correct: #6aaa64;
  --present: #c9b458;
  --absent: #787c7e;
  --banner-bg: #f4f4f5;
  --me-bg: #eef6ff;
  --accent: #538d4e;
  --live: #2cb67d;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #121213;
    --fg: #d7dadc;
    --muted: #818384;
    --line: #3a3a3c;
    --tile-line: #3a3a3c;
    --key-bg: #818384;
    --key-fg: #ffffff;
    --correct: #538d4e;
    --present: #b59f3b;
    --absent: #3a3a3c;
    --banner-bg: #1f1f21;
    --me-bg: #1d2a36;
    --accent: #6aaa64;
    --live: #3ddc97;
  }
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  display: flex;
  justify-content: center;
}
#app {
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  min-height: 100%;
  padding: 0 8px env(safe-area-inset-bottom) 8px;
}

/* ---- top bar ---- */
#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--line);
  padding: 8px 4px 6px;
}
.title { font-weight: 800; font-size: 18px; letter-spacing: 1px; }
#game-name { text-transform: uppercase; }
#challenge-no { color: var(--muted); font-weight: 700; margin-left: 6px; font-variant-numeric: tabular-nums; }
.timer {
  font-variant-numeric: tabular-nums;
  font-weight: 700;
  font-size: 16px;
  color: var(--muted);
  min-width: 48px;
  text-align: right;
}
.timer.running { color: var(--accent); }

/* ---- main / board ---- */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 10px 0;
}
.board { display: grid; grid-template-rows: repeat(6, 1fr); gap: 5px; }
.row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
.tile {
  width: 56px;
  height: 56px;
  border: 2px solid var(--tile-line);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 700;
  text-transform: uppercase;
  user-select: none;
  color: var(--fg);
  background: transparent;
}
@media (max-height: 640px) { .tile { width: 48px; height: 48px; font-size: 24px; } }
@media (max-width: 340px) { .tile { width: 48px; height: 48px; font-size: 24px; } }
.tile.filled { border-color: var(--muted); }
.tile.active { border-color: var(--fg); animation: pop 0.08s ease-in-out; }
.tile.correct { background: var(--correct); border-color: var(--correct); color: #fff; }
.tile.present { background: var(--present); border-color: var(--present); color: #fff; }
.tile.absent  { background: var(--absent);  border-color: var(--absent);  color: #fff; }
@keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
.row.shake { animation: shake 0.5s; }
@keyframes shake {
  10%, 90% { transform: translateX(-1px); }
  20%, 80% { transform: translateX(2px); }
  30%, 50%, 70% { transform: translateX(-4px); }
  40%, 60% { transform: translateX(4px); }
}

/* ---- toast ---- */
.toast {
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--fg);
  color: var(--bg);
  padding: 9px 14px;
  border-radius: 6px;
  font-weight: 700;
  font-size: 14px;
  z-index: 10;
  pointer-events: none;
  max-width: 90%;
  text-align: center;
}

/* ---- banner ---- */
.banner {
  margin-top: 14px;
  padding: 10px 14px;
  border-radius: 8px;
  background: var(--banner-bg);
  font-size: 15px;
  text-align: center;
}
.banner strong { font-weight: 800; }
.banner.win { background: var(--banner-bg); border: 1px solid var(--correct); }
.banner.lose { background: var(--banner-bg); border: 1px solid var(--line); }

/* ---- keyboard ---- */
.keyboard { display: flex; flex-direction: column; gap: 6px; padding: 8px 0 4px; }
.kb-row { display: flex; gap: 5px; justify-content: center; }
.kb-spacer { flex: 0.5; }
.key {
  flex: 1;
  min-width: 0;
  height: 52px;
  border: 0;
  border-radius: 5px;
  background: var(--key-bg);
  color: var(--key-fg);
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  cursor: pointer;
  user-select: none;
  font-family: inherit;
}
.key:active { filter: brightness(0.9); }
.key-wide { flex: 1.6; font-size: 11px; }
.key.correct { background: var(--correct); color: #fff; }
.key.present { background: var(--present); color: #fff; }
.key.absent  { background: var(--absent);  color: #fff; }

/* ---- presence (live now) ---- */
.presence {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px 0;
  font-size: 13px;
  color: var(--muted);
}
.presence .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--live);
  flex: 0 0 8px;
  box-shadow: 0 0 0 0 var(--live);
  animation: pulse 1.8s ease-out infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(44, 182, 125, 0.5); }
  70% { box-shadow: 0 0 0 8px rgba(44, 182, 125, 0); }
  100% { box-shadow: 0 0 0 0 rgba(44, 182, 125, 0); }
}

/* ---- leaderboard ---- */
.leaderboard { border-top: 1px solid var(--line); margin-top: 8px; padding: 10px 4px 16px; }
.lb-title { margin: 0 0 8px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
.lb-count { color: var(--muted); }
.lb-list { list-style: none; margin: 0; padding: 0; }
.lb-item {
  padding: 7px 8px;
  border-radius: 6px;
  font-size: 15px;
}
.lb-item + .lb-item { margin-top: 3px; }
.lb-item.me { background: var(--me-bg); }
.lb-item.lost { opacity: 0.6; }
.lb-main {
  display: grid;
  grid-template-columns: 26px 1fr auto auto;
  align-items: center;
  gap: 8px;
}
.lb-rank { text-align: center; font-weight: 700; }
.lb-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
.lb-tries { font-weight: 800; font-variant-numeric: tabular-nums; }
.lb-time { color: var(--muted); font-variant-numeric: tabular-nums; min-width: 44px; text-align: right; }
.lb-grid { padding-left: 34px; margin-top: 5px; display: flex; flex-direction: column; gap: 1.5px; }
.lb-grow { display: flex; gap: 1.5px; }
.lb-gs { width: 9px; height: 9px; border-radius: 1px; background: var(--absent); }
.lb-gs.C { background: var(--correct); }
.lb-gs.P { background: var(--present); }
.lb-gs.A { background: var(--absent); }
.lb-empty { color: var(--muted); font-size: 14px; margin: 4px 8px; }

/* ---- loading / waiting ---- */
.waiting {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  color: var(--muted);
  font-size: 15px;
}
.spinner {
  width: 34px;
  height: 34px;
  border: 3px solid var(--line);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

body.loading #main,
body.loading #keyboard,
body.loading #leaderboard,
body.loading #presence,
body.loading #timer { display: none !important; }
body:not(.loading) #waiting { display: none !important; }

.hidden { display: none !important; }
</style>
</head>
<body class="loading">
<div id="app">
  <header id="topbar">
    <div class="title">
      <span id="game-name">Word Challenge</span><span id="challenge-no"></span>
    </div>
    <div id="timer" class="timer">0:00</div>
  </header>

  <div id="waiting" class="waiting">
    <div class="spinner"></div>
    <p>Setting up the puzzle…</p>
  </div>

  <main id="main">
    <div id="board" class="board" aria-label="Guesses"></div>
    <div id="toast" class="toast hidden"></div>
    <div id="banner" class="banner hidden"></div>
  </main>

  <section id="keyboard" class="keyboard" aria-label="Keyboard"></section>

  <div id="presence" class="presence hidden">
    <span class="dot"></span><span id="presence-text"></span>
  </div>

  <section id="leaderboard" class="leaderboard">
    <h2 class="lb-title">Leaderboard <span id="lb-count" class="lb-count"></span></h2>
    <ol id="lb-list" class="lb-list"></ol>
    <p id="lb-empty" class="lb-empty">No one has finished yet — be the first.</p>
  </section>
</div>

<script src="webxdc.js"></script>

<script>
(function () {
  "use strict";

  // ----------------------------------------------------------------------
  // config
  // ----------------------------------------------------------------------
  var APP_NAME = "Word Challenge";
  var ROWS = 6, COLS = 5;
  var STATE_V = "v1";          // bump if the local-state shape changes
  var ROLL_FALLBACK_MS = 5000; // if our own challenge update never echoes back, self-adopt
  var PING_MS = 4000;          // how often to broadcast "I'm here" while playing
  var PRESENCE_TIMEOUT_MS = 12000; // drop someone from the "here" list after this much silence
  // Only the top-N most frequent words can be picked as the puzzle answer, so
  // players don't get smacked with "the word was ZLOTY". Anything in window.ANSWERS
  // is still accepted as a guess. 2330 lands the final answer pool at 2309
  // (matching original Wordle) after the ANSWER_BLOCKLIST filter below.
  var ANSWER_POOL_SIZE = 2330;

  // Words that are valid guesses (they live in WORDS) but should NEVER be the
  // puzzle answer — profanity, anatomy/sexual terms, and clinical/medical words
  // that would feel uncomfortable if the bubble announced "the word was X".
  // (Slurs are dropped from window.ANSWERS entirely, one level up, so they
  // aren't valid guesses either.)
  var ANSWER_BLOCKLIST = {
    // profanity / anatomy / sexual
    pussy:1, penis:1, sperm:1, semen:1, whore:1, bitch:1, cunts:1, cocks:1,
    boobs:1, prick:1, sluts:1, dicks:1, clits:1, nudes:1, booty:1, bimbo:1,
    horny:1, kinky:1, spunk:1, fucks:1, shits:1, asses:1, chink:1,
    // bodily / scatological
    farts:1, poops:1, pukes:1, puked:1, feces:1, fecal:1, retch:1, enema:1,
    spews:1,
    // medical / clinical / uncomfortable as a "guess the word" reveal
    pubic:1, mucus:1, vomit:1, bowel:1, polyp:1, tumor:1, ulcer:1, cysts:1,
    sores:1, welts:1, groin:1

  // ----------------------------------------------------------------------
  // webxdc (with a tiny in-memory stub so this file also runs in a plain browser)
  // ----------------------------------------------------------------------
  var webxdc = window.webxdc || makeStub();

  // ----------------------------------------------------------------------
  // word pool. WORDS is the full guess-validation list in frequency order
  // (most frequent first). ANSWER_POOL is the top slice used when rolling
  // a new puzzle. No duplication — one list, two views.
  // ----------------------------------------------------------------------
  var WORDS = (function () {
    var seen = {}, out = [];
    (window.ANSWERS || []).forEach(function (w) {
      w = String(w).toLowerCase().replace(/[^a-z]/g, "");
      if (w.length === COLS && !seen[w]) { seen[w] = 1; out.push(w); }
    });
    if (!out.length) out = ["about"];
    return out;
  })();
  var WORD_SET = (function () { var s = {}; WORDS.forEach(function (w) { s[w] = 1; }); return s; })();
  var ANSWER_POOL = WORDS.slice(0, Math.min(ANSWER_POOL_SIZE, WORDS.length))

  // ----------------------------------------------------------------------

    var rowTiles = [];
    for (var c = 0; c < COLS; c++) {
      var t = document.createElement("div");
      t.className = "tile";
      rowEl.appendChild(t);
      rowTiles.push(t);

  var ANSWER = null;

  var current = "";           // letters typed into the active row (only while !done)

  // challenge handling
  // ----------------------------------------------------------------------
  // 4-character ID drawn from 32 unambiguous chars (no 0/O, 1/I, missing visually-confusable letters).
  // 32^4 ≈ 1.05M possibilities — collision risk is ~negligible across a casual group's lifetime.
  var ID_ALPHABET = "23456789ABCDEFGHJKLMNPQRSTUVWXYZ";
  function genChallengeId() {
    var s = "";
    for (var i = 0; i < 4; i++) s += ID_ALPHABET.charAt(Math.floor(Math.random() * ID_ALPHABET.length));
    return s;
  }

  function adoptChallenge(c) {
    if (challenge) return;                          // the first one we ever see wins, for everyone
    if (!c || typeof c.id !== "string" || !c.id) return;
    var word = String(c.word || "").toUpperCase().replace(/[^A-Z]/g, "");
    if (word.length !== COLS) return;
    challenge = { id: c.id, word: word, by: c.by, ts: c.ts || 0 };
    ANSWER = challenge.word;
    DOCUMENT  = APP_NAME + " #" + challenge.id;
    DOC_FIELD = "#" + challenge.id;
    startGame();
  }

  function rollNewChallenge() {
    if (challenge || myRoll) return;
    myRoll = {
      id: genChallengeId(),
      word: ANSWER_POOL[Math.floor(Math.random() * ANSWER_POOL.length)].toUpperCase(),
      by: webxdc.selfAddr,
      ts: Date.now()
    };
    // No document/summary on this update on purpose: the "meta" update (sent by
    // challenge.by once the challenge resolves) owns the message name, so a losing
    // roll in a simultaneous-open race can never leave a stale ID on the bubble.
    webxdc.sendUpdate({
      payload: { type: "challenge", id: myRoll.id, word: myRoll.word, by: myRoll.by, ts: myRoll.ts }
    }, APP_NAME + " #" + myRoll.id + " started");
    setTimeout(function () { if (!challenge) adoptChallenge(myRoll); }, ROLL_FALLBACK_MS);
  }

  function maybeSendMeta() {
    if (!replayDone || !gameReady || !challenge || metaSent || metaSeen) return;
    if (challenge.by !== webxdc.selfAddr) return;
    metaSent = true;
    webxdc.sendUpdate({
      payload: { type: "meta", id: challenge.id },
      document: DOC_FIELD,
      summary: summaryText()
    }, DOCUMENT);
  }

  function startGame() {
    if (gameReady) return;
    gameReady = true;

    $challengeNo.textContent = " #" + challenge.id;

    SKEY = "wordchallenge:" + challenge.id + ":" + STATE_V;
    local = loadLocal() || { guesses: [], startedAt: 0, endedAt: 0, done: false, won: false, broadcast: false };
    if (!Array.isArray(local.guesses)) local.guesses = [];
    // drop state from any other challenge (or any leftover `dailyword:` keys from older builds)
    try {
      for (var i = localStorage.length - 1; i >= 0; i--) {
        var k = localStorage.key(i);
        if (!k) continue;
        if (k.lastIndexOf("dailyword:", 0) === 0) { localStorage.removeItem(k); continue; }
        if (k.lastIndexOf("wordchallenge:", 0) === 0 && k !== SKEY) localStorage.removeItem(k);
      }
    } catch (e) {}

    document.body.classList.remove("loading");
    renderAll();
    maybeSendMeta();
    startRealtime();
  }

  function loadLocal() {
    try { var raw = localStorage.getItem(SKEY); if (raw) return JSON.parse(raw); } catch (e) {}
    return null;
  }
  function saveLocal() {
    if (!SKEY) return;
    try { localStorage.setItem(SKEY, JSON.stringify(local)); } catch (e) {}
  }

  // ----------------------------------------------------------------------
  // scoring (standard Wordle rules, duplicate-letter aware)
  // ----------------------------------------------------------------------
  var RANK = { absent: 0, present: 1, correct: 2 };
  function scoreGuess(guess) {
    guess = guess.toUpperCase();
    var out = new Array(COLS), counts = {}, i, ch;
    for (i = 0; i < COLS; i++) { ch = ANSWER[i]; counts[ch] = (counts[ch] || 0) + 1; }
    for (i = 0; i < COLS; i++) { if (guess[i] === ANSWER[i]) { out[i] = "correct"; counts[guess[i]]--; } }
    for (i = 0; i < COLS; i++) {
      if (out[i]) continue;
      ch = guess[i];
      if (counts[ch] > 0) { out[i] = "present"; counts[ch]--; } else out[i] = "absent";
    }
    return out;
  }
  function patternFor(guesses) {
    return guesses.map(function (g) {
      return scoreGuess(g).map(function (s) {
        return s === "correct" ? "C" : s === "present" ? "P" : "A";
      }).join("");
    });
  }

  // ----------------------------------------------------------------------
  // rendering
  // ----------------------------------------------------------------------
  function fmtTime(ms) {
    if (!ms || ms < 0 || !isFinite(ms)) ms = 0;
    var s = Math.round(ms / 1000), m = Math.floor(s / 60);
    s -= m * 60;
    return m + ":" + (s < 10 ? "0" : "") + s;
  }
  function elapsed() {
    if (!local || !local.startedAt) return 0;
    return Math.max(0, (local.endedAt || Date.now()) - local.startedAt);
  }

  function renderBoard() {
    if (!gameReady) return;
    var activeRow = local.guesses.length;
    for (var r = 0; r < ROWS; r++) {
      rowEls[r].classList.remove("shake");
      var guess = local.guesses[r], sc = guess ? scoreGuess(guess) : null;
      for (var c = 0; c < COLS; c++) {
        var t = tiles[r][c];
        t.className = "tile";
        if (guess) {
          t.textContent = guess[c];
          t.classList.add("filled", sc[c]);
        } else if (r === activeRow && !local.done) {
          var ltr = current[c] || "";
          t.textContent = ltr;
          if (ltr) t.classList.add("filled", "active");
        } else {
          t.textContent = "";
        }
      }
    }
  }

  function renderKeyboard() {
    if (!gameReady) return;
    var best = {};
    local.guesses.forEach(function (g) {
      var sc = scoreGuess(g);
      for (var i = 0; i < COLS; i++) {
        var ch = g[i].toUpperCase();
        if (!(ch in best) || RANK[sc[i]] > RANK[best[ch]]) best[ch] = sc[i];
      }
    });
    Object.keys(keyEls).forEach(function (ch) {
      var el = keyEls[ch];
      el.classList.remove("correct", "present", "absent");
      if (best[ch]) el.classList.add(best[ch]);
    });
  }

  function renderTimer() {
    if (!gameReady) return;
    if (local.done) { $timer.textContent = fmtTime(elapsed()); $timer.classList.remove("running"); return; }
    if (local.startedAt) { $timer.textContent = fmtTime(Date.now() - local.startedAt); $timer.classList.add("running"); }
    else { $timer.textContent = "0:00"; $timer.classList.remove("running"); }
  }

  function renderBannerAndKeys() {
    if (!gameReady) return;
    if (local.done) {
      $kb.classList.add("hidden");
      $banner.classList.remove("hidden");
      if (local.won) {
        $banner.className = "banner win";
        $banner.innerHTML = "<strong>Solved in " + local.guesses.length + "/" + ROWS + "</strong> &middot; " + fmtTime(elapsed());
      } else {
        $banner.className = "banner lose";
        $banner.innerHTML = "<strong>Out of guesses.</strong> The word was <strong>" + ANSWER + "</strong>.";
      }
    } else {
      $kb.classList.remove("hidden");
      $banner.classList.add("hidden");
    }
  }

  // ----------------------------------------------------------------------
  // leaderboard + message document/summary
  // ----------------------------------------------------------------------
  function leaderboard() {
    var arr = Object.keys(results).map(function (addr) {
      var x = results[addr];
      return { addr: addr, name: x.name || addr, tries: x.tries, time: x.time, won: !!x.won, ts: x.ts || 0, pattern: x.pattern || [] };
    });
    arr.sort(function (a, b) {
      if (a.won !== b.won) return a.won ? -1 : 1;
      if (a.won) { if (a.tries !== b.tries) return a.tries - b.tries; if (a.time !== b.time) return a.time - b.time; }
      return a.ts - b.ts;
    });
    return arr;
  }
  function leader() { var a = leaderboard(); return (a.length && a[0].won) ? a[0] : null; }

  var MEDALS = ["🥇", "🥈", "🥉"];
  function buildTinyGrid(pattern) {
    if (!pattern || !pattern.length) return null;
    var wrap = document.createElement("div");
    wrap.className = "lb-grid";
    pattern.forEach(function (row) {
      var rowEl = document.createElement("div");
      rowEl.className = "lb-grow";
      for (var i = 0; i < row.length; i++) {
        var sq = document.createElement("span");
        var letter = row.charAt(i);
        sq.className = "lb-gs " + (letter === "C" || letter === "P" || letter === "A" ? letter : "A");
        rowEl.appendChild(sq);
      }
      wrap.appendChild(rowEl);
    });
    return wrap;
  }
  function renderLeaderboard() {
    var arr = leaderboard();
    $lbCount.textContent = arr.length ? "(" + arr.length + ")" : "";
    $lbList.innerHTML = "";
    if (!arr.length) { $lbEmpty.classList.remove("hidden"); return; }
    $lbEmpty.classList.add("hidden");
    arr.forEach(function (e, idx) {
      var li = document.createElement("li");
      li.className = "lb-item" + (e.addr === webxdc.selfAddr ? " me" : "") + (e.won ? "" : " lost");
      var main = document.createElement("div"); main.className = "lb-main";
      var rankCell = document.createElement("span"); rankCell.className = "lb-rank";
      rankCell.textContent = e.won ? (MEDALS[idx] || (idx + 1) + ".") : "💀";
      var nameCell = document.createElement("span"); nameCell.className = "lb-name";
      nameCell.textContent = e.name + (e.addr === webxdc.selfAddr ? " (you)" : "");
      var triesCell = document.createElement("span"); triesCell.className = "lb-tries";
      triesCell.textContent = (e.won ? e.tries : "X") + "/" + ROWS;
      var timeCell = document.createElement("span"); timeCell.className = "lb-time";
      timeCell.textContent = e.won ? fmtTime(e.time) : "—";
      main.appendChild(rankCell); main.appendChild(nameCell); main.appendChild(triesCell); main.appendChild(timeCell);
      li.appendChild(main);
      var grid = buildTinyGrid(e.pattern);
      if (grid) li.appendChild(grid);
      $lbList.appendChild(li);
    });
  }

  function summaryText() {
    var arr = leaderboard();
    var label = DOCUMENT || APP_NAME;
    if (!arr.length) return label + " — not finished yet";
    var top = leader();
    var played = arr.length + (arr.length === 1 ? " player" : " players");
    if (top) return "🏆 " + top.name + " · " + top.tries + "/" + ROWS + " in " + fmtTime(top.time) + " · " + played;
    return played + " · nobody's cracked it yet 😬";
  }

  // ----------------------------------------------------------------------
  // realtime presence — ephemeral "who's here" indicator via the realtime channel.
  // Done/viewing players still ping so the leaderboard-watcher feels the group.
  // No-op if the host doesn't support realtime.
  // ----------------------------------------------------------------------
  var ENC = (typeof TextEncoder !== "undefined") ? new TextEncoder() : null;
  var DEC = (typeof TextDecoder !== "undefined") ? new TextDecoder() : null;
  function startRealtime() {
    if (rt || typeof webxdc.joinRealtimeChannel !== "function" || !ENC || !DEC) return;
    try {
      rt = webxdc.joinRealtimeChannel();
      rt.setListener(onRealtime);
    } catch (e) { rt = null; return; }
    sendPing();                                                       // announce ourselves
    setInterval(sendPing, PING_MS);                                   // keep pinging while open (done or not)
    setInterval(function () { prunePresence(); renderPresence(); }, 2000);
  }
  function sendPing() {
    if (!rt) return;
    try {
      rt.send(ENC.encode(JSON.stringify({
        type: "ping",
        addr: webxdc.selfAddr,
        name: webxdc.selfName || webxdc.selfAddr || "Player",
        t: Date.now()
      })));
    } catch (e) {}
  }
  function onRealtime(data) {
    try {
      var msg = JSON.parse(DEC.decode(data));
      if (msg && msg.type === "ping" && msg.addr && msg.addr !== webxdc.selfAddr) {
        presence[msg.addr] = { name: msg.name || msg.addr, t: Date.now() };
        renderPresence();
      }
    } catch (e) {}
  }
  function prunePresence() {
    var now = Date.now();
    Object.keys(presence).forEach(function (a) {
      if (now - presence[a].t > PRESENCE_TIMEOUT_MS) delete presence[a];
    });
  }
  function renderPresence() {
    var names = Object.keys(presence).map(function (a) { return presence[a].name; });
    if (!names.length) { $presence.classList.add("hidden"); return; }
    $presence.classList.remove("hidden");
    var verb = names.length === 1 ? " is here" : " are here";
    var who;
    if (names.length === 1) who = names[0];
    else if (names.length === 2) who = names[0] + " and " + names[1];
    else if (names.length === 3) who = names[0] + ", " + names[1] + " and " + names[2];
    else who = names[0] + ", " + names[1] + " and " + (names.length - 2) + " others";
    $presenceText.textContent = who + verb;
  }

  // ----------------------------------------------------------------------
  // updates
  // ----------------------------------------------------------------------
  function applyUpdate(u) {
    var p = u.payload;
    if (!p) return;
    if (p.type === "challenge") { adoptChallenge(p); return; }
    if (p.type === "meta") { metaSeen = true; return; }   // carries only document/summary
    if (p.type === "result" && p.addr) {
      if (challenge && typeof p.id === "string" && p.id !== challenge.id) return; // stale (race)
      if (!results[p.addr]) {
        results[p.addr] = {
          name: p.name, tries: p.tries, time: p.time, won: !!p.won, ts: p.ts || 0,
          pattern: Array.isArray(p.pattern) ? p.pattern : []
        };
        if (p.addr === webxdc.selfAddr && local) { local.broadcast = true; saveLocal(); }
      }
    }
  }

  function broadcastResult() {
    var pattern = patternFor(local.guesses);
    var me = {
      name: webxdc.selfName || webxdc.selfAddr || "Player",
      tries: local.guesses.length,
      time: elapsed(),
      won: !!local.won,
      ts: Date.now(),
      pattern: pattern
    };
    // Reflect locally first so the new leader can be computed including ourselves.
    if (!results[webxdc.selfAddr]) results[webxdc.selfAddr] = me;
    local.broadcast = true; saveLocal();

    // Only notify the chat when someone takes the #1 spot AND they aren't the very
    // first entry on the board (no one to "lead" against yet — would be spammy).
    var top = leader();                              // best winner after adding me
    var imLeader = top && top.addr === webxdc.selfAddr;
    var firstOnBoard = Object.keys(results).length === 1;
    var leadTake = imLeader && !firstOnBoard;

    // Always post an info message in the chat when someone finishes (so the
    // group sees activity). Reserve `notify` (the push notification) for the
    // case where they actually took the lead — that's the noteworthy event.
    var resultText = me.won
      ? "📊 " + me.name + " solved " + DOCUMENT + " in " + me.tries + "/" + ROWS + " — " + fmtTime(me.time)
      : "📊 " + me.name + " couldn't solve " + DOCUMENT + " (X/" + ROWS + ")";

    var update = {
      payload: {
        type: "result", id: challenge.id, addr: webxdc.selfAddr,
        name: me.name, tries: me.tries, time: me.time, won: me.won, ts: me.ts, pattern: pattern
      },
      info: resultText,
      document: DOC_FIELD,
      summary: summaryText()
    };
    var descr = resultText;

    if (leadTake) {
      var leadText = "🏆 " + me.name + " is now leading " + DOCUMENT
        + " — " + me.tries + "/" + ROWS + " in " + fmtTime(me.time);
      update.info = leadText;         // upgrade the chat line to the more interesting one
      update.notify = { "*": leadText };
      descr = leadText;
    }
    webxdc.sendUpdate(update, descr);
  }

  // ----------------------------------------------------------------------
  // input / game flow
  // ----------------------------------------------------------------------
  var toastTimer = null;
  function toast(msg, ms) {
    $toast.textContent = msg;
    $toast.classList.remove("hidden");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { $toast.classList.add("hidden"); }, ms || 1400);
  }
  function shakeRow() {
    var el = rowEls[local.guesses.length];
    if (!el) return;
    el.classList.remove("shake"); void el.offsetWidth; el.classList.add("shake");
  }

  function handleKey(key) {
    if (!gameReady || local.done) return;
    if (key === "ENTER") return submitGuess();
    if (key === "BACK") { if (current.length) { current = current.slice(0, -1); renderBoard(); } return; }
    if (/^[A-Z]$/.test(key) && current.length < COLS) {
      if (!local.startedAt) { local.startedAt = Date.now(); saveLocal(); renderTimer(); }
      current += key;
      renderBoard();
    }
  }

  var PRAISE = ["Genius!", "Magnificent!", "Impressive!", "Splendid!", "Great!", "Phew!"];
  function submitGuess() {
    if (current.length < COLS) { toast("Not enough letters"); shakeRow(); return; }
    var guess = current;
    if (!WORD_SET[guess.toLowerCase()]) { toast("Not in word list"); shakeRow(); return; }
    if (!local.startedAt) local.startedAt = Date.now();
    local.guesses.push(guess);
    current = "";
    var won = (guess === ANSWER);
    var lost = !won && local.guesses.length >= ROWS;
    if (won || lost) { local.done = true; local.won = won; local.endedAt = Date.now(); }
    saveLocal();
    renderBoard(); renderKeyboard(); renderTimer(); renderBannerAndKeys();
    if (won) toast(PRAISE[Math.min(local.guesses.length - 1, PRAISE.length - 1)], 2400);
    else if (lost) toast(ANSWER, 3000);
    if (local.done) { broadcastResult(); renderLeaderboard(); }
  }

  // ----------------------------------------------------------------------
  // boot
  // ----------------------------------------------------------------------
  function renderAll() {
    renderBoard(); renderKeyboard(); renderTimer(); renderBannerAndKeys(); renderLeaderboard(); renderPresence();
  }

  webxdc.setUpdateListener(function (u) {
    applyUpdate(u);
    if (gameReady) renderLeaderboard();
    if (replayDone) maybeSendMeta();
  }, 0).then(function () {
    replayDone = true;
    if (!challenge) {
      rollNewChallenge();           // nobody has set the puzzle yet — we do
    } else {
      if (local && local.done && !local.broadcast && !results[webxdc.selfAddr]) broadcastResult();
      maybeSendMeta();
    }
  });

  setInterval(function () { if (gameReady && !local.done && local.startedAt) renderTimer(); }, 250);

  // ----------------------------------------------------------------------
  // dev stub: only used when opened directly in a browser (no webxdc host)
  // ----------------------------------------------------------------------
  function makeStub() {
    console.warn("[Word Challenge] webxdc.js not found — using an in-memory dev stub.");
    var listeners = [], updates = [];
    var api = {
      selfAddr: "you@dev",
      selfName: "You",
      sendUpdate: function (u) {
        var rec = {
          payload: u.payload, info: u.info, document: u.document, summary: u.summary,
          serial: updates.length + 1, max_serial: updates.length + 1
        };
        updates.push(rec);
        if (u.info) console.log("[info]", u.info);
        if (u.document || u.summary) console.log("[doc]", u.document, "|", u.summary);
        listeners.forEach(function (cb) { try { cb(rec); } catch (e) { console.error(e); } });
      },
      setUpdateListener: function (cb) {
        listeners.push(cb);
        updates.forEach(function (rec) { cb(rec); });
        return Promise.resolve();
      },
      joinRealtimeChannel: function () {
        return {
          send: function (data) { console.log("[rt-send]", data && data.length, "bytes"); },
          setListener: function () {},
          leave: function () {}
        };
      }
    };
    // expose so dev-mode tests can inject foreign updates the way real peers would
    try { window.webxdc = api; } catch (e) {}
    return api;
  }
})();
</script>
</body>
</html>
